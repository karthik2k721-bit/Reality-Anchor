<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reality Anchor</title>
    <link rel="stylesheet" href="popup-styles.css" />
</head>

<body>
    <main class="panel">
        <header class="header">
            <h1>Reality Anchor</h1>
            <p>Stay present, one check-in at a time.</p>
        </header>

        <section class="timer-card">
            <div class="row">
                <span class="label">Focus Timer</span>
                <div class="timer-editor">
                    <input id="timer-input" class="timer-input" type="text" value="25:00" inputmode="numeric"
                        spellcheck="false" aria-label="Focus timer duration" readonly />
                    <button id="timer-preset-btn" class="timer-preset-btn" type="button" aria-label="Preset durations"
                        aria-haspopup="menu" aria-expanded="false">▼</button>
                    <div class="timer-stepper">
                        <button id="timer-up" class="timer-step" type="button" aria-label="Increase timer">▲</button>
                        <button id="timer-down" class="timer-step" type="button" aria-label="Decrease timer">▼</button>
                    </div>
                </div>
            </div>
            <p id="session-state" class="session-state">Session not running</p>
            <button id="start-stop-button" class="primary">Start Focus</button>
        </section>

        <!-- Preset timer dropdown menu (hidden by default, shown on button click) -->
        <div id="timer-preset-menu" class="timer-preset-menu hidden" role="menu">
            <div class="timer-preset-item" data-minutes="5" role="menuitem">5 min</div>
            <div class="timer-preset-item" data-minutes="10" role="menuitem">10 min</div>
            <div class="timer-preset-item" data-minutes="15" role="menuitem">15 min</div>
            <div class="timer-preset-item" data-minutes="20" role="menuitem">20 min</div>
            <div class="timer-preset-item" data-minutes="25" role="menuitem">25 min</div>
            <div class="timer-preset-item" data-minutes="30" role="menuitem">30 min</div>
            <div class="timer-preset-item" data-minutes="35" role="menuitem">35 min</div>
            <div class="timer-preset-item" data-minutes="40" role="menuitem">40 min</div>
            <div class="timer-preset-item" data-minutes="45" role="menuitem">45 min</div>
            <div class="timer-preset-item" data-minutes="50" role="menuitem">50 min</div>
            <div class="timer-preset-item" data-minutes="55" role="menuitem">55 min</div>
            <div class="timer-preset-item" data-minutes="60" role="menuitem">60 min</div>
        </div>

        <section class="drift-card">
            <div class="row">
                <span class="label">Drift count today</span>
                <span id="drift-count" class="drift-count">0</span>
            </div>
            <button id="reset-button" class="secondary">Reset Today</button>
        </section>
    </main>

    <script src="popup.js"></script>
</body>

</html>
