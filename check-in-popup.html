<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check-in</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6faf8;
            --surface: #ffffff;
            --ink: #1f2937;
            --muted: #516173;
            --yes: #0f766e;
            --no: #b45309;
            --line: #d9e6e1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #ebf7f1, var(--bg));
            color: var(--ink);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 20px rgba(10, 36, 30, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.1rem;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .actions {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            color: #fff;
        }

        #yes-btn {
            background: var(--yes);
        }

        #no-btn {
            background: var(--no);
        }

        .hint {
            margin-top: 10px;
            font-size: 0.78rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Are you still focused?</h1>
        <p>Take a second to check in with yourself.</p>

        <div class="actions">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>

        <p class="hint">No response in 30 seconds counts as a soft drift.</p>
    </main>

    <script src="check-in-popup.js"></script>
</body>

</html>
